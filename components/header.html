<script>
  (function(){
    // Build mobile nav from desktop links and handle toggle/navigation
    function buildMobile(){
      const desktop = document.getElementById('desktop-nav-links');
      const mobileList = document.getElementById('mobile-nav-list');
      const menu = document.getElementById('mobile-menu');
      if(!desktop || !mobileList || !menu) return;
      mobileList.innerHTML = '';
        desktop.querySelectorAll('a[href]').forEach(a => {
        const href = a.getAttribute('href') || '#';
        const text = (a.textContent || '').trim();
        const item = document.createElement('a');
        item.href = href;
        item.className = 'block px-3 py-2 rounded-md hover:bg-slate-50 dark:hover:bg-slate-800';
        item.textContent = text;
        item.addEventListener('click', function(ev){
          const navEl = document.getElementById('top-nav'); if(navEl) navEl.classList.remove('mobile-open');
          document.documentElement.style.overflow = '';
          if(href && href !== '#' && !href.startsWith('http')){
            ev.preventDefault();
            setTimeout(()=> location.href = href, 80);
          }
        });
        mobileList.appendChild(item);
      });
      
    }

    const btn = document.getElementById('mobile-menu-btn');
    const menu = document.getElementById('mobile-menu');
    if(!btn || !menu) return;
    btn.style.cursor = 'pointer';

    // toggle mobile-open class on the top nav to show/hide drawer
    const navEl = document.getElementById('top-nav');
    btn.addEventListener('click', ()=>{
      if(navEl) navEl.classList.toggle('mobile-open');
      // prevent body scroll when open
      if(navEl && navEl.classList.contains('mobile-open')) document.documentElement.style.overflow = 'hidden';
      else document.documentElement.style.overflow = '';
    });

    // close button inside drawer
    const closeBtn = document.getElementById('mobile-menu-close');
    if(closeBtn){
      closeBtn.addEventListener('click', ()=>{
        if(navEl) navEl.classList.remove('mobile-open');
        document.documentElement.style.overflow = '';
      });
    }

    // initial build and keep in sync
    buildMobile();
    const desktop = document.getElementById('desktop-nav-links');
    if(desktop && window.MutationObserver){
      const obs = new MutationObserver(buildMobile);
      obs.observe(desktop, {childList:true, subtree:true});
    }
  })();
</script>

<style>
  /* right-side drawer styles */
  #mobile-menu{ position: fixed; top: 0; right: 0; height: 100vh; width: 320px; max-width: 80vw; transform: translateX(100%); transition: transform .28s ease, visibility .28s ease; visibility: hidden; z-index: 65; box-shadow: -20px 0 40px rgba(2,6,23,0.12); }
  #top-nav.mobile-open #mobile-menu{ transform: translateX(0); visibility: visible; }
  /* style links like reference */
  #mobile-nav-list a{ color: #1e3a8a; font-weight:700; display:block; padding-left: 0.75rem; padding-right:0.75rem; }
  #mobile-nav-list a:hover{ background: rgba(30,58,138,0.03); }

  #mobile-nav-list .cta-full{ display:block; width:100%; text-align:center; margin-top:1rem; }

  /* keep brand and hamburger visible behind drawer (as in reference) */
  #top-nav .container { position: relative; z-index: 70; }
</style>
