<section class="py-12 bg-background-light dark:bg-background-dark min-h-screen">
  <div class="container mx-auto px-4">
    <div class="flex flex-col lg:flex-row gap-8">
      <aside class="lg:w-1/4">
        <div class="sticky top-24 space-y-6">
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-6">
            <label class="text-xs font-bold text-secondary uppercase mb-3 block tracking-wider">Buscar Estudio</label>
            <div class="relative">
              <input id="study-search" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-lg text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none dark:text-white transition-all placeholder-slate-400" placeholder="Ej. Resonancia, Sangre..." type="text"/>
              <span class="material-icons-outlined absolute left-3 top-2.5 text-slate-400 text-lg">search</span>
            </div>
          </div>
          <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden">
            <div class="p-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 flex justify-between items-center">
              <h3 class="font-bold text-slate-800 dark:text-white">Categorías</h3>
              <div class="flex items-center gap-2">
                <span class="bg-blue-100 dark:bg-blue-900 text-primary dark:text-blue-300 text-xs font-bold px-2 py-0.5 rounded-full">8</span>
                <button id="study-categories-toggle" aria-expanded="true" class="block sm:hidden p-2 rounded-md text-slate-600 hover:bg-slate-50 dark:hover:bg-slate-700/50">
                  <span class="material-icons-outlined">expand_more</span>
                </button>
              </div>
            </div>
            <div id="study-categories-panel" class="p-2 block">
              <nav id="study-categories" class="space-y-1" aria-label="Categorías"></nav>
            </div>
          </div>
          
        </div>
      </aside>

      <main class="lg:w-3/4">
        <div class="mb-6 flex justify-between items-center">
          <p class="text-sm text-slate-500 dark:text-slate-400">Mostrando <span class="font-bold text-slate-800 dark:text-white">12</span> categorías de servicios</p>
          <div class="flex items-center gap-2">
            <label for="study-sort" class="text-xs font-medium text-slate-500 hidden sm:block">Ordenar por:</label>
            <select id="study-sort" class="form-select text-sm border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 rounded-lg focus:ring-primary focus:border-primary py-1.5 pl-3 pr-8">
              <option value="relevance">Relevancia</option>
              <option value="name">Nombre (A-Z)</option>
              <option value="popular">Más solicitados</option>
            </select>
          </div>
        </div>

        <!-- Dynamic containers: grid/grid and accordion will be populated by JS -->
          <!-- Mobile accordion list (visible on small screens) -->
          <div id="studies-list-accordion" class="block md:hidden space-y-3">
            <!-- items injected by JS for mobile -->
          </div>

          <!-- Grid for md+ (hidden on mobile) -->
          <div id="studies-list-grid" class="hidden md:grid md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- items injected by JS for md+ -->
          </div>
        <div class="mt-12 flex justify-center">
          <nav class="flex items-center gap-2 bg-white dark:bg-slate-800 p-2 rounded-xl shadow-sm border border-slate-100 dark:border-slate-700">
            <button class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500"><span class="material-icons-outlined">chevron_left</span></button>
            <button class="w-10 h-10 flex items-center justify-center rounded-lg bg-primary text-white font-bold shadow-md shadow-blue-500/20">1</button>
            <button class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium">2</button>
            <button class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-600 dark:text-slate-300 font-medium">3</button>
            <button class="w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-slate-500"><span class="material-icons-outlined">chevron_right</span></button>
          </nav>
        </div>


      </main>
    </div>
  </div>
</section>
